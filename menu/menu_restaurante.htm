<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Ementa do Restaurante</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
   
    <header>
        <h1 class="titulo-principal">Bem-vindo</h1>
    </header>

    <main class="ementa-container">

        <h2 class="titulo-ementa">Ementa</h2>

        <section class="entradas">
            <h3 class="titulo-secundario">Entradas</h3>
            <ul class="lista-entradas">
                <li>Sopa do dia — <span class="preco">3,50€</span></li>
                <li>Pão e manteiga — <span class="preco">1,00€</span></li>
            </ul>
        </section>

        <section class="pratos-principais">
            <h3 class="titulo-secundario">Pratos Principais</h3>

            <table class="tabela-pratos">
                <tr>
                    <th class="coluna-prato">Pratos</th>
                    <th class="coluna-preco">Preço</th>
                </tr>
                <tr>
                    <td class="nome-prato">Bacalhau à Brás</td>
                    <td class="preco">12,00€</td>
                </tr>
                <tr>
                    <td class="nome-prato">Frango grelhado</td>
                    <td class="preco">9,50€</td>
                </tr>
            </table>
        </section>

        <section class="sobremesas">
            <h3 class="titulo-secundario">Sobremesas</h3>
            <ul class="lista-sobremesas">
                <li>Mousse de chocolate — <span class="preco">3,00€</span></li>
                <li>Fruta da época — <span class="preco">2,50€</span></li>
            </ul>
        </section>

    </main>

</body>
</html>
